<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Szorzótábla gyakorló</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Szorzótábla gyakorló (1–10)</h1>

    <div class="ops">
      <label><input type="checkbox" id="mul"> Szorzás</label>
      <label><input type="checkbox" id="div"> Osztás</label>
    </div>

    <button id="newTask">Új feladat</button>

    <div class="question" id="question">?</div>

    <input type="number" id="answer" placeholder="Írd be a választ">

    <button id="checkBtn">Ellenőrzés</button>

    <div class="timer" id="timer">Hátralévő idő: 10 mp</div>

    <div class="result" id="result"></div>

    <div class="stats">
      Helyes: <span id="good">0</span> |
      Rossz: <span id="bad">0</span>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question');
    const answerEl = document.getElementById('answer');
    const resultEl = document.getElementById('result');
    const timerEl = document.getElementById('timer');
    const goodEl = document.getElementById('good');
    const badEl = document.getElementById('bad');
    const checkBtn = document.getElementById('checkBtn');

    let a, b, correctAnswer, op;
    let good = 0;
    let bad = 0;
    let timeLeft = 10;
    let timerInterval;
    let lockInput = false;
    let wrongAttempts = 0;
    let mode = "check";
    let autoNextInterval;

    function pickOperation() {
      let ops = [];
      if (document.getElementById("mul").checked) ops.push("×");
      if (document.getElementById("div").checked) ops.push("÷");
      if (ops.length === 0) return null;
      return ops[Math.floor(Math.random() * ops.length)];
    }

    function setCheckMode() {
      mode = "check";
      checkBtn.textContent = "Ellenőrzés";
    }

    function setNextMode() {
      mode = "next";
      checkBtn.textContent = "Következő";
    }

    function startAutoNext() {
      let next = 3;
      autoNextInterval = setInterval(() => {
        next--;
        resultEl.textContent = `Helyes! Következő feladat ${next} mp múlva...`;
        if (next <= 0) {
          clearInterval(autoNextInterval);
          newQuestion();
        }
      }, 1000);
    }

    function newQuestion() {
      lockInput = false;
      wrongAttempts = 0;
      setCheckMode();

      clearInterval(autoNextInterval);

      timeLeft = 10;
      timerEl.textContent = "Hátralévő idő: 10 mp";

      op = pickOperation();
      if (!op) {
        questionEl.textContent = "Válassz műveletet!";
        return;
      }

      a = Math.floor(Math.random() * 10) + 1;
      b = Math.floor(Math.random() * 10) + 1;

      if (op === "×") {
        correctAnswer = a * b;
        questionEl.textContent = `${a} × ${b} = ?`;
      }

      if (op === "÷") {
        correctAnswer = a;
        b = Math.floor(Math.random() * 10) + 1;
        a = correctAnswer * b;
        questionEl.textContent = `${a} ÷ ${b} = ?`;
      }

      resultEl.textContent = "";
      resultEl.className = "result";

      answerEl.value = "";
      answerEl.focus();

      clearInterval(timerInterval);
      timerInterval = setInterval(countdown, 1000);
    }

    function countdown() {
      timeLeft--;
      timerEl.textContent = `Hátralévő idő: ${timeLeft} mp`;

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        handleWrong();
      }
    }

    function handleWrong() {
      wrongAttempts++;

      if (wrongAttempts < 3) {
        bad++;
        badEl.textContent = bad;
        resultEl.textContent = "Helytelen";
        resultEl.className = "result wrong";

        timeLeft = 10;
        timerEl.textContent = "Hátralévő idő: 10 mp";
        clearInterval(timerInterval);
        timerInterval = setInterval(countdown, 1000);
        answerEl.value = "";
        answerEl.focus();
      } else {
        bad++;
        badEl.textContent = bad;
        resultEl.textContent = `A helyes válasz: ${correctAnswer}`;
        resultEl.className = "result wrong";
        lockInput = true;
        setNextMode();
        startAutoNext();
      }
    }

    function checkAnswer() {
      if (lockInput) return;

      const userValue = Number(answerEl.value);
      clearInterval(timerInterval);

      if (userValue === correctAnswer) {
        good++;
        goodEl.textContent = good;
        resultEl.textContent = "Helyes! Következő feladat 3 mp múlva...";
        resultEl.className = "result correct";
        lockInput = true;
        setNextMode();
        startAutoNext();
      } else {
        handleWrong();
      }
    }

    answerEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (mode === "check") checkAnswer();
        else if (mode === "next") newQuestion();
      }
    });

    checkBtn.onclick = () => {
      if (mode === "check") checkAnswer();
      else if (mode === "next") newQuestion();
    };

    document.getElementById("newTask").onclick = newQuestion;

    newQuestion();
  </script>
</body>
</html>
