<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <title>Közös nevező gyakorló</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="nav-links">
      <a href="https://debmatyas.github.io/matek/GyokhegyiMark/muveletek.html">Alapműveletek</a>
      <a href="https://debmatyas.github.io/matek/GyokhegyiMark/kozos_nevezo.html">Közös nevező</a>
      <a href="https://debmatyas.github.io/matek/GyokhegyiMark/osztoja.html">Osztója?</a>
      <a href="https://debmatyas.github.io/matek/GyokhegyiMark/szorzotabla.html">Szorzás és osztás</a>
    </div>
    <h1>Add meg a közös nevezőt!</h1>

    <div class="fraction-display">
      <div class="frac-show">
        <div id="showNum1">?</div>
        <div class="line-show"></div>
        <div id="showDen1">?</div>
      </div>

      <div class="frac-show">
        <div id="showNum2">?</div>
        <div class="line-show"></div>
        <div id="showDen2">?</div>
      </div>
    </div>

    <div class="grid">

      <div class="cell">
        <div class="row">
          <div class="label-left">Számláló</div>
          <input type="number" id="num1" class="frac-input">
        </div>

        <div class="line input_line"></div>

        <div class="row">
          <div class="label-left">Nevező</div>
          <input type="number" id="den1" class="frac-input">
        </div>
      </div>

      <div class="cell">
        <div class="row">
          <div class="label-left">Számláló</div>
          <input type="number" id="num2" class="frac-input">
        </div>

        <div class="line input_line"></div>

        <div class="row">
          <div class="label-left">Nevező</div>
          <input type="number" id="den2" class="frac-input">
        </div>
      </div>

    </div>

    <button id="checkBtn">Ellenőrzés</button>
    <button id="nextBtn">Következő feladat</button>

    <div class="result" id="result"></div>

    <div class="stats">
      Helyes: <span id="good">0</span> |
      Rossz: <span id="bad">0</span>
    </div>
  </div>

  <script>
    const showNum1 = document.getElementById('showNum1');
    const showDen1 = document.getElementById('showDen1');
    const showNum2 = document.getElementById('showNum2');
    const showDen2 = document.getElementById('showDen2');

    const num1El = document.getElementById('num1');
    const den1El = document.getElementById('den1');
    const num2El = document.getElementById('num2');
    const den2El = document.getElementById('den2');

    const resultEl = document.getElementById('result');
    const goodEl = document.getElementById('good');
    const badEl = document.getElementById('bad');

    let a, b, c, d;
    let newNum1, newNum2, commonDen;
    let good = 0;
    let bad = 0;
    let attempts = 0;

    function gcd(x, y) {
      while (y !== 0) {
        let t = y;
        y = x % y;
        x = t;
      }
      return x;
    }

    function lcm(x, y) {
      return (x * y) / gcd(x, y);
    }

    function simplify(num, den) {
      const g = gcd(num, den);
      return [num / g, den / g];
    }

    function generateSimpleFraction() {
      const den = Math.floor(Math.random() * 8) + 2;
      const num = Math.floor(Math.random() * (den - 1)) + 1;
      return [num, den];
    }

    // function generateSimpleFraction() {
    //   const den = Math.floor(Math.random() * 14) + 2;
    //   const num = Math.floor(Math.random() * (den - 1)) + 1;
    //   return [num, den];
    // }

    // function generateSimpleFraction() {
    //   const den = Math.floor(Math.random() * 19) + 2;
    //   const num = Math.floor(Math.random() * (den - 1)) + 1;
    //   return [num, den];
    // }

    // function generateSimpleFraction() {
    //   const den = Math.floor(Math.random() * 49) + 2; // 2–50
    //   const num = Math.floor(Math.random() * (den - 1)) + 1;
    //   return [num, den];
    // }


    // function generateSimpleFraction() {
    //   const den = Math.floor(Math.random() * 90) + 10; // 10–99
    //   const num = Math.floor(Math.random() * (den - 1)) + 1;
    //   return [num, den];
    // }


    function newTask() {
      resultEl.textContent = "";
      resultEl.className = "result";
      attempts = 0;

      [a, b] = generateSimpleFraction();
      [c, d] = generateSimpleFraction();

      commonDen = lcm(b, d);
      newNum1 = a * (commonDen / b);
      newNum2 = c * (commonDen / d);

      showNum1.textContent = a;
      showDen1.textContent = b;
      showNum2.textContent = c;
      showDen2.textContent = d;

      num1El.value = "";
      den1El.value = "";
      num2El.value = "";
      den2El.value = "";
      num1El.focus();
    }

    function prettyFrac(num, den) {
      return `
        <span class="pretty-frac">
          <div class="top">${num}</div>
          <div class="bottom">${den}</div>
        </span>
      `;
    }

    function check() {
      attempts++;

      const u1 = Number(num1El.value);
      const ud1 = Number(den1El.value);
      const u2 = Number(num2El.value);
      const ud2 = Number(den2El.value);

      if (!u1 || !ud1 || !u2 || !ud2) {
        resultEl.textContent = "Tölts ki minden mezőt!";
        resultEl.className = "result wrong";
        return;
      }

      const [s1n, s1d] = simplify(u1, ud1);
      const [s2n, s2d] = simplify(u2, ud2);

      const valueCorrect = (s1n === a && s1d === b && s2n === c && s2d === d);

      const isSimplified1 = (s1n === u1 && s1d === ud1);
      const isSimplified2 = (s2n === u2 && s2d === ud2);

      if (valueCorrect) {
        if (!isSimplified1 || !isSimplified2) {
          resultEl.textContent = "Add meg egyszerűbb alakban!";
          resultEl.className = "result wrong";
          return;
        }

        good++;
        goodEl.textContent = good;
        resultEl.textContent = "Helyes!";
        resultEl.className = "result correct";
        return;
      }

      if (attempts < 3) {
        bad++;
        badEl.textContent = bad;
        resultEl.textContent = "Nem jó, próbáld újra!";
        resultEl.className = "result wrong";
        return;
      }

      bad++;
      badEl.textContent = bad;

      resultEl.innerHTML =
        "Helyes megoldás:<br>" +
        prettyFrac(newNum1, commonDen) +
        " és " +
        prettyFrac(newNum2, commonDen);

      resultEl.className = "result wrong";
    }
    document.getElementById('checkBtn').addEventListener('click', check);
    document.getElementById('nextBtn').addEventListener('click', newTask);

    [num1El, den1El, num2El, den2El].forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') check();
      });
    });

    newTask();
  </script>
</body>

</html>
