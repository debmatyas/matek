<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>QR e-mail HTML generátor</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  #preview .item { margin-bottom: 24px; }
  #preview .name { font-size: 16px; font-weight: bold; margin-bottom: 6px; }
  #preview img { width: 200px; height: 200px; }
  #code { width: 100%; height: 250px; font-family: monospace; }
</style>
</head>
<body>

<h1>QR e-mail HTML kód</h1>
<p>Az alábbi kódot másold be az e-mail HTML nézetébe.</p>

<h2>Generált HTML kód</h2>
<textarea id="code" readonly></textarea>

<h2>Előnézet</h2>
<div id="preview"></div>

<script>
function generateEmailHtml() {
  const params = new URLSearchParams(window.location.search);
  const items = params.getAll("data");

  const codeEl = document.getElementById("code");
  const previewEl = document.getElementById("preview");

  if (items.length === 0) {
    codeEl.value = "<!-- Nincs data paraméter az URL-ben -->";
    previewEl.innerHTML = "<p>Nincs data paraméter az URL-ben.</p>";
    return;
  }

  let htmlSnippet = "";

  items.forEach(raw => {
    const decoded = decodeURIComponent(raw.trim());
    const parts = decoded.split("|");
    const name = parts[2] ? parts[2].trim() : "Név ismeretlen";

    const qrUrl =
      "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
      encodeURIComponent(decoded);

    // HTML, amit majd e-mailbe lehet illeszteni
    htmlSnippet +=
      '<div style="margin-bottom:24px;">' +
        '<div style="font-size:16px;font-weight:bold;margin-bottom:6px;">' +
          name +
        "</div>" +
        '<img src="' + qrUrl + '" alt="QR kód" style="width:200px;height:200px;" />' +
      "</div>\n";

    // Előnézet
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <div class="name">${name}</div>
      <img src="${qrUrl}" alt="QR">
    `;
    previewEl.appendChild(div);
  });

  codeEl.value = htmlSnippet.trim();
}

generateEmailHtml();
</script>

</body>
</html>
