<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>QR kód generátor</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .item { margin-bottom: 24px; }
  .name { font-size: 16px; font-weight: bold; margin-bottom: 6px; }
  img { width: 200px; height: 200px; }
</style>
</head>
<body>

<div id="container"></div>

<script>
function renderQRCodes() {
  const params = new URLSearchParams(window.location.search);
  const items = params.getAll("data");

  const container = document.getElementById("container");

  if (items.length === 0) {
    container.innerHTML = "<p>Nincs data paraméter.</p>";
    return;
  }

  items.forEach(raw => {
    const decoded = decodeURIComponent(raw.trim());
    const parts = decoded.split("|");

    // A név a 3. elem (index 2)
    const name = parts[2] ? parts[2].trim() : "Név ismeretlen";

    const qrUrl =
      "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
      encodeURIComponent(decoded);

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="name">${name}</div>
      <img src="${qrUrl}" alt="QR kód">
    `;

    container.appendChild(div);
  });
}

renderQRCodes();
</script>

</body>
</html>
