<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>QR PDF</title>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=mattyas|etyeki@gmail.com";

function loadImageAsDataURL(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.onload = function () {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL("image/png"));
    };
    img.onerror = reject;
    img.src = url;
  });
}

async function showPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const dataUrl = await loadImageAsDataURL(qrUrl);

  doc.addImage(dataUrl, "PNG", 10, 10, 80, 80);
  doc.addImage(dataUrl, "PNG", 110, 10, 80, 80);

  const pdfBlob = doc.output("blob");
  const pdfUrl = URL.createObjectURL(pdfBlob);

  // PDF megnyitása új lapon — mint egy API
  window.location.href = pdfUrl;
}

window.onload = showPDF;
</script>

</body>
</html>
